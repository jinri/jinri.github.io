<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div></pre></td><td class="code"><pre><div class="line">vi openssl.ld</div><div class="line">OPENSSL_1.0.0 &#123;</div><div class="line">global:</div><div class="line">*;</div><div class="line">&#125;;</div></pre></td></tr></table></figure>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div></pre></td><td class="code"><pre><div class="line">./config --prefix=/usr/local --openssldir=/usr/local/openssl shared -Wl,--version-script=/root/new/openssl-1.0.1t/openssl.ld -Wl,-Bsymbolic-functions</div><div class="line">make</div><div class="line">make test</div><div class="line">make install</div><div class="line">ldconfig</div></pre></td></tr></table></figure>
