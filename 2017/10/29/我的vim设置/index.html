        <figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div></pre></td><td class="code"><pre><div class="line">set nocompatible         &quot;关闭 vi 兼容模式                                                                                </div><div class="line">syntax on                &quot;自动语法高亮      </div><div class="line">set number               &quot;显示行号                                                                                        </div><div class="line"> &quot;set autoindent           &quot;vim使用自动对齐，也就是把当前行的对齐格式应用到下一行(自动缩进）                               </div><div class="line"> &quot;set cindent              &quot;cindent是特别针对 C语言语法自动缩进                                                            </div><div class="line"> &quot;set smartindent          &quot;依据上面的对齐格式，智能的选择对齐方式，对于类似C语言编写上有用                                </div><div class="line"> &quot;set ai                   &quot;设置自动缩进                                                                                   </div><div class="line"> &quot;set cursorline          &quot;为光标所在行加下划线                                                                            </div><div class="line">set laststatus=2         &quot;总是显示状态行
